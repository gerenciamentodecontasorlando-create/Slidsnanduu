<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideCraft Pro — Criador de Slides & Documentos</title>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.min.js">
    </script>
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
            --text2: #64748b;
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --accent-hover: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px -8px rgba(0, 0, 0, 0.12), 0 8px 16px -6px rgba(0, 0, 0, 0.07);
            --shadow-xl: 0 30px 60px -12px rgba(0, 0, 0, 0.18), 0 10px 24px -8px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .app-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            letter-spacing: -0.3px;
        }
        .app-logo .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            padding: 9px 18px;
            border-radius: var(--radius-xs);
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            letter-spacing: 0.1px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            font-family: inherit;
        }
        .btn-pptx {
            background: #fff1f0;
            color: #d4380d;
            border: 1.5px solid #ffccc7;
        }
        .btn-pptx:hover {
            background: #ffd8d4;
            border-color: #ff9c8e;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }
        .btn-docx {
            background: #e6f7ff;
            color: #096dd9;
            border: 1.5px solid #bae0ff;
        }
        .btn-docx:hover {
            background: #d0eeff;
            border-color: #7cc5ff;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }
        .btn-icon {
            font-size: 1.1rem;
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 60px);
        }

        /* SIDEBAR LEFT */
        .sidebar-left {
            width: 210px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 12px;
            gap: 8px;
            overflow-y: auto;
        }
        .sidebar-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text2);
            font-weight: 700;
            padding: 4px 6px;
        }
        .slides-thumbnails {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }
        .slide-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: var(--radius-xs);
            border: 2.5px solid transparent;
            cursor: pointer;
            overflow: hidden;
            background: #fafafa;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .slide-thumb:hover {
            border-color: #c7d2fe;
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }
        .slide-thumb.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
            transform: translateY(-2px);
        }
        .slide-thumb .thumb-inner {
            width: 100%;
            height: 100%;
            transform-origin: top left;
            pointer-events: none;
        }
        .slide-thumb .thumb-number {
            position: absolute;
            bottom: 3px;
            right: 6px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.85);
            padding: 1px 5px;
            border-radius: 3px;
            z-index: 2;
            pointer-events: none;
        }
        .slide-thumb .thumb-delete {
            position: absolute;
            top: 3px;
            right: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.85);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
            z-index: 3;
            line-height: 1;
        }
        .slide-thumb:hover .thumb-delete {
            opacity: 1;
        }
        .slide-thumb .thumb-delete:hover {
            background: #ef4444;
            transform: scale(1.2);
        }
        .btn-add-slide {
            width: 100%;
            padding: 10px;
            border: 2px dashed var(--border);
            border-radius: var(--radius-xs);
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: var(--text2);
            transition: var(--transition);
            font-family: inherit;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn-add-slide:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #f5f3ff;
        }

        /* CENTER PREVIEW */
        .center-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: #e8ecf1;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
            overflow: auto;
        }
        .preview-wrapper {
            width: 100%;
            max-width: 820px;
            aspect-ratio: 16 / 9;
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            position: relative;
            transition: var(--transition);
            background: #fff;
        }
        .preview-wrapper:hover {
            box-shadow: 0 35px 70px -15px rgba(0, 0, 0, 0.2), 0 12px 28px -10px rgba(0, 0, 0, 0.1);
        }
        .slide-canvas {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* PROPERTIES PANEL RIGHT */
        .sidebar-right {
            width: 280px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 16px;
            gap: 16px;
        }
        .panel-section {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border);
        }
        .panel-section h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text2);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .layout-cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .layout-card {
            aspect-ratio: 16 / 10;
            border-radius: var(--radius-xs);
            border: 2px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            position: relative;
            overflow: hidden;
            padding: 6px;
        }
        .layout-card:hover {
            border-color: #c7d2fe;
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }
        .layout-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: #f5f3ff;
        }
        .layout-card .layout-preview {
            width: 100%;
            height: 100%;
            border-radius: 2px;
        }
        .layout-preview.type1 {
            background: #e0e7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }
        .layout-preview.type1 .bar {
            width: 60%;
            height: 6px;
            background: #6366f1;
            border-radius: 3px;
            opacity: 0.6;
        }
        .layout-preview.type1 .bar.short {
            width: 35%;
            height: 4px;
            opacity: 0.4;
        }
        .layout-preview.type2 {
            display: flex;
            gap: 3px;
            background: #fce7f3;
        }
        .layout-preview.type2 .img-col {
            width: 45%;
            background: #f472b6;
            border-radius: 2px;
            opacity: 0.5;
        }
        .layout-preview.type2 .txt-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            justify-content: center;
            padding: 4px;
        }
        .layout-preview.type2 .txt-col .bar {
            height: 5px;
            background: #be185d;
            border-radius: 3px;
            opacity: 0.5;
        }
        .layout-preview.type2 .txt-col .bar.short {
            width: 55%;
            height: 3px;
            opacity: 0.35;
        }
        .layout-preview.type3 {
            background: #d1fae5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            padding: 3px;
        }
        .layout-preview.type3 .cell {
            background: #10b981;
            border-radius: 1px;
            opacity: 0.45;
        }
        .layout-label {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 4px;
            color: var(--text2);
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }
        .form-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text2);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xs);
            font-family: inherit;
            font-size: 0.85rem;
            transition: var(--transition);
            background: #fff;
            resize: vertical;
            color: var(--text);
        }
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.06);
        }
        .form-group textarea {
            min-height: 50px;
            font-size: 0.8rem;
        }
        .image-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .image-slot {
            width: 60px;
            height: 45px;
            border-radius: var(--radius-xs);
            border: 2px dashed var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            font-size: 1.2rem;
            color: #cbd5e1;
        }
        .image-slot:hover {
            border-color: var(--accent);
            background: #f5f3ff;
            color: var(--accent);
        }
        .image-slot.has-image {
            border-style: solid;
            border-color: #d1d5db;
            padding: 0;
        }
        .image-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        .image-slot .remove-img {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.8);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
            z-index: 2;
            line-height: 1;
        }
        .image-slot:hover .remove-img {
            opacity: 1;
        }
        .color-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            align-items: center;
        }
        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .color-swatch:hover {
            transform: scale(1.15);
            box-shadow: var(--shadow);
        }
        .color-swatch.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            transform: scale(1.1);
        }
        .color-input-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .color-input-wrap input[type="color"] {
            width: 32px;
            height: 28px;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            padding: 0;
            background: transparent;
        }

        /* DROP ZONE OVERLAY ON PREVIEW */
        .drop-zone-overlay {
            position: absolute;
            border: 2px dashed rgba(99, 102, 241, 0.5);
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            background: rgba(99, 102, 241, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #6366f1;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .preview-wrapper.drag-over .drop-zone-overlay {
            opacity: 1;
            background: rgba(99, 102, 241, 0.08);
            border-color: var(--accent);
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0%,
            100% {
                border-color: var(--accent);
            }
            50% {
                border-color: #a5b4fc;
            }
        }
        .drop-zone-overlay.zone-full {
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 0;
        }
        .drop-zone-overlay.zone-left {
            top: 4px;
            left: 4px;
            bottom: 4px;
            width: calc(50% - 6px);
        }
        .drop-zone-overlay.zone-grid {
            top: 30%;
            left: 3px;
            right: 3px;
            bottom: 3px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4px;
            padding: 4px;
            background: transparent;
            border: none;
            pointer-events: none;
        }
        .drop-zone-overlay.zone-grid .grid-cell {
            border: 1.5px dashed rgba(99, 102, 241, 0.45);
            border-radius: 3px;
            background: rgba(99, 102, 241, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #818cf8;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 9999;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: var(--shadow-lg);
            letter-spacing: 0.2px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #dc2626;
        }

        /* RESPONSIVE */
        @media (max-width: 1100px) {
            .sidebar-right {
                width: 240px;
                padding: 10px;
                gap: 10px;
            }
            .sidebar-left {
                width: 160px;
                padding: 8px;
            }
            .layout-cards {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 4px;
            }
        }
        @media (max-width: 800px) {
            .sidebar-right {
                display: none;
            }
            .sidebar-left {
                width: 130px;
            }
            .center-preview {
                padding: 15px;
            }
            .btn span.btn-label {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="app-header">
        <div class="app-logo">
            <div class="logo-icon">✦</div>
            <span>SlideCraft Pro</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-pptx" onclick="exportToPPTX()" title="Exportar como PowerPoint (.pptx)">
                <span class="btn-icon">📊</span> <span class="btn-label">Exportar PPTX</span>
            </button>
            <button class="btn btn-docx" onclick="exportToDOCX()" title="Exportar como Word (.doc)">
                <span class="btn-icon">📄</span> <span class="btn-label">Exportar Documento</span>
            </button>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
        <!-- SIDEBAR LEFT: thumbnails -->
        <aside class="sidebar-left" id="sidebarLeft">
            <span class="sidebar-label">📑 Slides</span>
            <div class="slides-thumbnails" id="slidesThumbnails"></div>
            <button class="btn-add-slide" onclick="addSlide()" title="Adicionar novo slide">＋ Novo Slide</button>
        </aside>

        <!-- CENTER PREVIEW -->
        <main class="center-preview" id="centerPreview">
            <div class="preview-wrapper" id="previewWrapper">
                <div class="slide-canvas" id="slideCanvas"></div>
                <div class="drop-zone-overlay zone-full" id="dropZoneOverlay">🖼️ Solte a imagem aqui</div>
            </div>
        </main>

        <!-- SIDEBAR RIGHT: properties -->
        <aside class="sidebar-right" id="sidebarRight">
            <!-- Layout selector -->
            <div class="panel-section">
                <h4>📐 Layout do Slide</h4>
                <div class="layout-cards" id="layoutCards">
                    <div class="layout-card selected" data-layout="1" onclick="setLayout(1)">
                        <div class="layout-preview type1">
                            <div class="bar"></div><div class="bar short"></div>
                        </div>
                    </div>
                    <div class="layout-card" data-layout="2" onclick="setLayout(2)">
                        <div class="layout-preview type2">
                            <div class="img-col"></div>
                            <div class="txt-col"><div class="bar"></div><div class="bar short"></div></div>
                        </div>
                    </div>
                    <div class="layout-card" data-layout="3" onclick="setLayout(3)">
                        <div class="layout-preview type3">
                            <div class="cell"></div><div class="cell"></div>
                            <div class="cell"></div><div class="cell"></div>
                        </div>
                    </div>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:4px;">
                    <span class="layout-label">Título + Imagem</span>
                    <span class="layout-label">Imagem + Texto</span>
                    <span class="layout-label">Grid de Imagens</span>
                </div>
            </div>

            <!-- Text inputs -->
            <div class="panel-section">
                <h4>✏️ Conteúdo</h4>
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="slideTitle" placeholder="Título do slide..." oninput="updateCurrentSlideText()">
                </div>
                <div class="form-group">
                    <label>Subtítulo / Texto</label>
                    <textarea id="slideSubtitle" placeholder="Subtítulo ou descrição..." oninput="updateCurrentSlideText()" rows="2"></textarea>
                </div>
            </div>

            <!-- Image slots -->
            <div class="panel-section" id="imageSlotsPanel">
                <h4>🖼️ Imagens</h4>
                <div class="image-slots" id="imageSlotsContainer"></div>
                <input type="file" id="hiddenFileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
                <p style="font-size:0.65rem;color:var(--text2);margin-top:6px;">Clique nos slots ou arraste imagens para o slide.</p>
            </div>

            <!-- Background color -->
            <div class="panel-section">
                <h4>🎨 Cor de Fundo</h4>
                <div class="color-swatches" id="colorSwatches">
                    <div class="color-swatch selected" style="background:#ffffff;" data-color="#ffffff" onclick="setBgColor('#ffffff')"></div>
                    <div class="color-swatch" style="background:#f1f5f9;" data-color="#f1f5f9" onclick="setBgColor('#f1f5f9')"></div>
                    <div class="color-swatch" style="background:#e0e7ff;" data-color="#e0e7ff" onclick="setBgColor('#e0e7ff')"></div>
                    <div class="color-swatch" style="background:#dbeafe;" data-color="#dbeafe" onclick="setBgColor('#dbeafe')"></div>
                    <div class="color-swatch" style="background:#d1fae5;" data-color="#d1fae5" onclick="setBgColor('#d1fae5')"></div>
                    <div class="color-swatch" style="background:#fef3c7;" data-color="#fef3c7" onclick="setBgColor('#fef3c7')"></div>
                    <div class="color-swatch" style="background:#fce7f3;" data-color="#fce7f3" onclick="setBgColor('#fce7f3')"></div>
                    <div class="color-swatch" style="background:#1e293b;" data-color="#1e293b" onclick="setBgColor('#1e293b')"></div>
                    <div class="color-input-wrap">
                        <input type="color" id="customBgColor" value="#ffffff" onchange="setBgColor(this.value)">
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ APP STATE ============
            const app = {
                slides: [],
                currentIndex: 0,
            };

            // Default slide
            function createDefaultSlide() {
                return {
                    id: Date.now() + Math.random(),
                    layout: 1,
                    title: 'Bem-vindo ao SlideCraft Pro',
                    subtitle: 'Crie slides impressionantes com designs que superam o PowerPoint tradicional.',
                    images: [], // array de data URLs
                    bgColor: '#ffffff',
                };
            }

            // Initialize with one slide
            app.slides.push(createDefaultSlide());
            app.currentIndex = 0;

            // ============ DOM REFS ============
            const slidesThumbnails = document.getElementById('slidesThumbnails');
            const slideCanvas = document.getElementById('slideCanvas');
            const previewWrapper = document.getElementById('previewWrapper');
            const dropZoneOverlay = document.getElementById('dropZoneOverlay');
            const slideTitleInput = document.getElementById('slideTitle');
            const slideSubtitleInput = document.getElementById('slideSubtitle');
            const imageSlotsContainer = document.getElementById('imageSlotsContainer');
            const hiddenFileInput = document.getElementById('hiddenFileInput');
            const customBgColor = document.getElementById('customBgColor');
            const layoutCards = document.querySelectorAll('.layout-card');
            const colorSwatches = document.querySelectorAll('.color-swatch');
            const toast = document.getElementById('toast');

            let pendingImageSlotIndex = 0; // which slot to fill on file select

            // ============ TOAST ============
            function showToast(message, type = '') {
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }

            // ============ GET CURRENT SLIDE ============
            function getCurrentSlide() {
                return app.slides[app.currentIndex];
            }

            // ============ RENDER SLIDE TO CONTAINER ============
            function renderSlideHTML(slide, container, scale = 1) {
                container.innerHTML = '';
                const wrapper = document.createElement('div');
                wrapper.style.cssText = `
                    width: ${800 * scale}px;
                    height: ${450 * scale}px;
                    background: ${slide.bgColor};
                    position: relative;
                    overflow: hidden;
                    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
                    box-sizing: border-box;
                `;

                const isDark = isColorDark(slide.bgColor);
                const textColor = isDark ? '#ffffff' : '#1e293b';
                const textColor2 = isDark ? '#e2e8f0' : '#475569';
                const overlayBg = isDark ? 'rgba(0,0,0,0.35)' : 'rgba(255,255,255,0.7)';

                if (slide.layout === 1) {
                    // Layout 1: Full background image + centered text
                    if (slide.images.length > 0 && slide.images[0]) {
                        const img = document.createElement('img');
                        img.src = slide.images[0];
                        img.style.cssText =
                            'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
                        wrapper.appendChild(img);
                        // overlay for text readability
                        const ov = document.createElement('div');
                        ov.style.cssText =
                            'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);pointer-events:none;';
                        wrapper.appendChild(ov);
                    }
                    const textContainer = document.createElement('div');
                    textContainer.style.cssText = `
                        position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                        text-align:center;z-index:2;padding:20px 30px;
                        background:${slide.images.length > 0 ? overlayBg : 'transparent'};
                        border-radius:12px;max-width:85%;
                    `;
                    const titleEl = document.createElement('h2');
                    titleEl.textContent = slide.title || 'Título';
                    titleEl.style.cssText = `font-size:${32*scale}px;font-weight:700;color:${slide.images.length > 0 ? '#fff' : textColor};margin:0 0 ${8*scale}px;letter-spacing:-0.5px;`;
                    const subEl = document.createElement('p');
                    subEl.textContent = slide.subtitle || '';
                    subEl.style.cssText = `font-size:${16*scale}px;color:${slide.images.length > 0 ? 'rgba(255,255,255,0.9)' : textColor2};margin:0;line-height:1.5;`;
                    textContainer.appendChild(titleEl);
                    textContainer.appendChild(subEl);
                    wrapper.appendChild(textContainer);
                } else if (slide.layout === 2) {
                    // Layout 2: Image left, text right
                    if (slide.images.length > 0 && slide.images[0]) {
                        const img = document.createElement('img');
                        img.src = slide.images[0];
                        img.style.cssText =
                            'position:absolute;top:0;left:0;width:50%;height:100%;object-fit:cover;';
                        wrapper.appendChild(img);
                    } else {
                        const placeholder = document.createElement('div');
                        placeholder.style.cssText =
                            'position:absolute;top:0;left:0;width:50%;height:100%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:40px;color:#cbd5e1;';
                        placeholder.textContent = '🖼️';
                        wrapper.appendChild(placeholder);
                    }
                    const textContainer = document.createElement('div');
                    textContainer.style.cssText = `
                        position:absolute;top:0;right:0;width:50%;height:100%;
                        display:flex;flex-direction:column;justify-content:center;
                        padding:${30*scale}px ${25*scale}px;box-sizing:border-box;
                    `;
                    const titleEl = document.createElement('h3');
                    titleEl.textContent = slide.title || 'Título';
                    titleEl.style.cssText = `font-size:${26*scale}px;font-weight:700;color:${textColor};margin:0 0 ${10*scale}px;letter-spacing:-0.3px;`;
                    const subEl = document.createElement('p');
                    subEl.textContent = slide.subtitle || '';
                    subEl.style.cssText = `font-size:${14*scale}px;color:${textColor2};margin:0;line-height:1.6;`;
                    textContainer.appendChild(titleEl);
                    textContainer.appendChild(subEl);
                    wrapper.appendChild(textContainer);
                } else if (slide.layout === 3) {
                    // Layout 3: Grid 2x2 of images + title on top
                    const titleEl = document.createElement('h3');
                    titleEl.textContent = slide.title || 'Título';
                    titleEl.style.cssText = `position:absolute;top:${12*scale}px;left:${20*scale}px;z-index:3;font-size:${22*scale}px;font-weight:700;color:${textColor};margin:0;letter-spacing:-0.3px;`;
                    wrapper.appendChild(titleEl);
                    const grid = document.createElement('div');
                    grid.style.cssText = `
                        position:absolute;top:${50*scale}px;left:${10*scale}px;right:${10*scale}px;bottom:${10*scale}px;
                        display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:${6*scale}px;
                    `;
                    for (let i = 0; i < 4; i++) {
                        const cell = document.createElement('div');
                        cell.style.cssText =
                            'border-radius:6px;overflow:hidden;background:#e2e8f0;display:flex;align-items:center;justify-content:center;';
                        if (slide.images[i]) {
                            const img = document.createElement('img');
                            img.src = slide.images[i];
                            img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
                            cell.appendChild(img);
                        } else {
                            const ph = document.createElement('span');
                            ph.style.cssText = 'font-size:28px;color:#cbd5e1;';
                            ph.textContent = '🖼️';
                            cell.appendChild(ph);
                        }
                        grid.appendChild(cell);
                    }
                    wrapper.appendChild(grid);
                }

                container.appendChild(wrapper);
            }

            // ============ RENDER PREVIEW ============
            function renderPreview() {
                const slide = getCurrentSlide();
                if (!slide) return;
                renderSlideHTML(slide, slideCanvas, 1);
                updateDropZoneOverlay(slide);
                updatePropertiesPanel(slide);
                updateThumbnails();
            }

            // ============ UPDATE DROP ZONE OVERLAY ============
            function updateDropZoneOverlay(slide) {
                dropZoneOverlay.className = 'drop-zone-overlay';
                if (slide.layout === 1) {
                    dropZoneOverlay.classList.add('zone-full');
                    dropZoneOverlay.textContent = '🖼️ Solte a imagem aqui (fundo)';
                } else if (slide.layout === 2) {
                    dropZoneOverlay.classList.add('zone-left');
                    dropZoneOverlay.textContent = '🖼️ Imagem';
                } else if (slide.layout === 3) {
                    dropZoneOverlay.classList.add('zone-grid');
                    dropZoneOverlay.innerHTML = `
                        <div class="grid-cell">🖼️</div><div class="grid-cell">🖼️</div>
                        <div class="grid-cell">🖼️</div><div class="grid-cell">🖼️</div>
                    `;
                }
            }

            // ============ UPDATE PROPERTIES PANEL ============
            function updatePropertiesPanel(slide) {
                slideTitleInput.value = slide.title || '';
                slideSubtitleInput.value = slide.subtitle || '';
                customBgColor.value = slide.bgColor || '#ffffff';

                // Layout cards
                layoutCards.forEach(card => {
                    card.classList.toggle('selected', parseInt(card.dataset.layout) === slide.layout);
                });

                // Color swatches
                colorSwatches.forEach(swatch => {
                    swatch.classList.toggle('selected', swatch.dataset.color === slide.bgColor);
                });
                // If custom color not in swatches, deselect all swatches
                const foundSwatch = Array.from(colorSwatches).some(s => s.dataset.color === slide.bgColor);
                if (!foundSwatch) {
                    colorSwatches.forEach(s => s.classList.remove('selected'));
                }

                // Image slots
                renderImageSlots(slide);
            }

            // ============ RENDER IMAGE SLOTS ============
            function renderImageSlots(slide) {
                imageSlotsContainer.innerHTML = '';
                let slotCount = 1;
                if (slide.layout === 3) slotCount = 4;
                if (slide.layout === 1 || slide.layout === 2) slotCount = 1;

                for (let i = 0; i < slotCount; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'image-slot';
                    if (slide.images[i]) {
                        slot.classList.add('has-image');
                        const img = document.createElement('img');
                        img.src = slide.images[i];
                        slot.appendChild(img);
                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'remove-img';
                        removeBtn.textContent = '✕';
                        removeBtn.title = 'Remover imagem';
                        removeBtn.onclick = (e) => {
                            e.stopPropagation();
                            removeImage(i);
                        };
                        slot.appendChild(removeBtn);
                    } else {
                        slot.textContent = '＋';
                        slot.style.fontSize = '1.4rem';
                    }
                    slot.title = slide.images[i] ? 'Clique para trocar' : 'Clique para adicionar imagem';
                    slot.onclick = () => {
                        pendingImageSlotIndex = i;
                        hiddenFileInput.click();
                    };
                    // Drag & drop on slot
                    slot.ondragover = (e) => { e.preventDefault();
                        slot.style.borderColor = '#6366f1';
                        slot.style.background = '#f5f3ff'; };
                    slot.ondragleave = (e) => { slot.style.borderColor = '';
                        slot.style.background = ''; };
                    slot.ondrop = (e) => {
                        e.preventDefault();
                        slot.style.borderColor = '';
                        slot.style.background = '';
                        const file = e.dataTransfer.files[0];
                        if (file && file.type.startsWith('image/')) {
                            loadImageToSlot(file, i);
                        }
                    };
                    imageSlotsContainer.appendChild(slot);
                }
            }

            // ============ UPDATE THUMBNAILS ============
            function updateThumbnails() {
                slidesThumbnails.innerHTML = '';
                app.slides.forEach((slide, index) => {
                    const thumb = document.createElement('div');
                    thumb.className = 'slide-thumb' + (index === app.currentIndex ? ' active' : '');
                    thumb.onclick = () => selectSlide(index);

                    const inner = document.createElement('div');
                    inner.className = 'thumb-inner';
                    thumb.appendChild(inner);

                    // Render tiny preview
                    const scale = 0.195; // 156x88 approx
                    renderSlideHTML(slide, inner, scale);

                    // Number
                    const num = document.createElement('span');
                    num.className = 'thumb-number';
                    num.textContent = index + 1;
                    thumb.appendChild(num);

                    // Delete button
                    if (app.slides.length > 1) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'thumb-delete';
                        delBtn.textContent = '✕';
                        delBtn.title = 'Remover slide';
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            removeSlide(index);
                        };
                        thumb.appendChild(delBtn);
                    }

                    slidesThumbnails.appendChild(thumb);
                });
            }

            // ============ SELECT SLIDE ============
            function selectSlide(index) {
                if (index >= 0 && index < app.slides.length) {
                    app.currentIndex = index;
                    renderPreview();
                }
            }

            // ============ ADD SLIDE ============
            window.addSlide = function() {
                const newSlide = createDefaultSlide();
                newSlide.title = 'Novo Slide ' + (app.slides.length + 1);
                newSlide.subtitle = 'Descreva seu conteúdo aqui...';
                app.slides.push(newSlide);
                app.currentIndex = app.slides.length - 1;
                renderPreview();
                showToast('✅ Slide adicionado!', 'success');
                // Scroll thumbnails to bottom
                slidesThumbnails.scrollTop = slidesThumbnails.scrollHeight;
            };

            // ============ REMOVE SLIDE ============
            function removeSlide(index) {
                if (app.slides.length <= 1) {
                    showToast('⚠️ Mantenha pelo menos um slide.', 'error');
                    return;
                }
                app.slides.splice(index, 1);
                if (app.currentIndex >= app.slides.length) {
                    app.currentIndex = app.slides.length - 1;
                }
                if (app.currentIndex < 0) app.currentIndex = 0;
                renderPreview();
                showToast('🗑️ Slide removido.', '');
            }

            // ============ SET LAYOUT ============
            window.setLayout = function(layout) {
                const slide = getCurrentSlide();
                if (!slide) return;
                slide.layout = layout;
                // Keep only relevant images when switching layouts
                const maxImages = layout === 3 ? 4 : 1;
                slide.images = slide.images.slice(0, maxImages);
                renderPreview();
                showToast('📐 Layout ' + layout + ' aplicado!', 'success');
            };

            // ============ UPDATE TEXT ============
            window.updateCurrentSlideText = function() {
                const slide = getCurrentSlide();
                if (!slide) return;
                slide.title = slideTitleInput.value;
                slide.subtitle = slideSubtitleInput.value;
                renderSlideHTML(slide, slideCanvas, 1);
                updateThumbnails();
            };

            // ============ SET BG COLOR ============
            window.setBgColor = function(color) {
                const slide = getCurrentSlide();
                if (!slide) return;
                slide.bgColor = color;
                customBgColor.value = color;
                renderPreview();
            };

            // ============ IMAGE HANDLING ============
            window.handleFileSelect = function(event) {
                const file = event.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    loadImageToSlot(file, pendingImageSlotIndex);
                }
                hiddenFileInput.value = '';
            };

            function loadImageToSlot(file, slotIndex) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const slide = getCurrentSlide();
                    if (!slide) return;
                    slide.images[slotIndex] = e.target.result;
                    renderPreview();
                    showToast('🖼️ Imagem adicionada ao slot ' + (slotIndex + 1) + '!', 'success');
                };
                reader.readAsDataURL(file);
            }

            function removeImage(slotIndex) {
                const slide = getCurrentSlide();
                if (!slide) return;
                slide.images[slotIndex] = null;
                // Clean up array
                slide.images = slide.images.filter(img => img !== null && img !== undefined);
                renderPreview();
                showToast('🗑️ Imagem removida.', '');
            }

            // ============ DRAG & DROP ON PREVIEW ============
            previewWrapper.addEventListener('dragover', (e) => {
                e.preventDefault();
                previewWrapper.classList.add('drag-over');
            });
            previewWrapper.addEventListener('dragleave', (e) => {
                if (!previewWrapper.contains(e.relatedTarget)) {
                    previewWrapper.classList.remove('drag-over');
                }
            });
            previewWrapper.addEventListener('drop', (e) => {
                e.preventDefault();
                previewWrapper.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/')) {
                    showToast('⚠️ Por favor, solte um arquivo de imagem.', 'error');
                    return;
                }
                const slide = getCurrentSlide();
                if (!slide) return;
                // Determine which slot to fill
                let targetSlot = 0;
                if (slide.layout === 3) {
                    // Find first empty slot in grid
                    targetSlot = slide.images.findIndex(img => !img);
                    if (targetSlot === -1) targetSlot = slide.images.length;
                    if (targetSlot >= 4) targetSlot = 0; // overwrite first
                }
                // For layout 1 and 2, slot 0
                loadImageToSlot(file, targetSlot);
            });

            // ============ EXPORT PPTX ============
            window.exportToPPTX = async function() {
                if (typeof PptxGenJS === 'undefined') {
                    showToast(
                        '⚠️ Biblioteca PPTX não carregada. Verifique sua conexão com a internet.',
                        'error');
                    return;
                }
                try {
                    const pptx = new PptxGenJS();
                    pptx.defineLayout({ name: 'WIDE', width: '13.333', height: '7.5' });
                    pptx.layout = 'WIDE';

                    for (const slide of app.slides) {
                        const s = pptx.addSlide();
                        // Background
                        if (slide.bgColor && slide.bgColor !== '#ffffff') {
                            s.background = { color: slide.bgColor };
                        }

                        if (slide.layout === 1) {
                            if (slide.images[0]) {
                                s.background = { path: slide.images[0] };
                            }
                            s.addText(slide.title || '', {
                                x: 0.8,
                                y: 2.2,
                                w: 11.7,
                                h: 1.6,
                                fontSize: 36,
                                bold: true,
                                color: slide.images[0] ? 'FFFFFF' : '1e293b',
                                align: 'center',
                                fontFace: 'Segoe UI',
                            });
                            if (slide.subtitle) {
                                s.addText(slide.subtitle, {
                                    x: 1.5,
                                    y: 3.9,
                                    w: 10.3,
                                    h: 1.2,
                                    fontSize: 18,
                                    color: slide.images[0] ? 'F0F0F0' : '475569',
                                    align: 'center',
                                    fontFace: 'Segoe UI',
                                });
                            }
                        } else if (slide.layout === 2) {
                            if (slide.images[0]) {
                                s.addImage({ path: slide.images[0], x: 0, y: 0, w: 6.4, h: 7.5, sizing: { type: 'cover',
                                        w: 6.4, h: 7.5 } });
                            }
                            s.addText(slide.title || '', {
                                x: 6.8,
                                y: 1.8,
                                w: 6,
                                h: 1.5,
                                fontSize: 30,
                                bold: true,
                                color: '1e293b',
                                fontFace: 'Segoe UI',
                            });
                            if (slide.subtitle) {
                                s.addText(slide.subtitle, {
                                    x: 6.8,
                                    y: 3.4,
                                    w: 6,
                                    h: 2.5,
                                    fontSize: 16,
                                    color: '475569',
                                    fontFace: 'Segoe UI',
                                });
                            }
                        } else if (slide.layout === 3) {
                            s.addText(slide.title || '', {
                                x: 0.5,
                                y: 0.3,
                                w: 12.3,
                                h: 0.9,
                                fontSize: 26,
                                bold: true,
                                color: '1e293b',
                                fontFace: 'Segoe UI',
                            });
                            const gridPositions = [
                                { x: 0.4, y: 1.5, w: 6, h: 2.8 },
                                { x: 6.9, y: 1.5, w: 6, h: 2.8 },
                                { x: 0.4, y: 4.5, w: 6, h: 2.8 },
                                { x: 6.9, y: 4.5, w: 6, h: 2.8 },
                            ];
                            for (let i = 0; i < 4; i++) {
                                if (slide.images[i]) {
                                    s.addImage({ path: slide.images[i], ...gridPositions[i],
                                        sizing: { type: 'cover', w: gridPositions[i].w, h: gridPositions[
                                                i].h } });
                                }
                            }
                        }
                    }

                    await pptx.writeFile({ fileName: 'Apresentacao_SlideCraft.pptx' });
                    showToast('✅ PowerPoint exportado com sucesso!', 'success');
                } catch (err) {
                    console.error('Erro ao exportar PPTX:', err);
                    showToast('❌ Erro ao exportar PPTX. Tente novamente.', 'error');
                }
            };

            // ============ EXPORT DOCX (HTML as .doc) ============
            window.exportToDOCX = function() {
                try {
                    let docHTML = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office"
                      xmlns:w="urn:schemas-microsoft-com:office:word"
                      xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                    <meta charset="UTF-8">
                    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
                    <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View>
                    <w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
                    <style>
                        @page { size: A4 landscape; margin: 1.5cm; }
                        body { font-family: 'Segoe UI', Arial, sans-serif; color: #1e293b; }
                        .slide-page { 
                            page-break-after: always; 
                            margin-bottom: 20px; 
                            padding: 20px;
                            border: 1px solid #e2e8f0;
                            border-radius: 8px;
                            min-height: 15cm;
                            position: relative;
                        }
                        .slide-page:last-child { page-break-after: auto; }
                        h2 { font-size: 24pt; font-weight: 700; margin: 0 0 8pt; }
                        p { font-size: 13pt; color: #475569; margin: 0; line-height: 1.5; }
                        img { max-width: 100%; border-radius: 4px; }
                        table { width: 100%; border-collapse: collapse; }
                        table td { vertical-align: top; padding: 8px; }
    </style>
</head>
<body>`;

                    app.slides.forEach((slide) => {
                    docHTML += `<div class="slide-page" style="background:${slide.bgColor};${isColorDark(slide.bgColor) ? 'color:#ffffff;' : ''}">`;

                    if (slide.layout === 1) {
                    if (slide.images[0]) {
                    docHTML +=
                        `<div style="text-align:center;margin-bottom:12px;"><img src="${slide.images[0]}" style="max-width:100%;max-height:350px;object-fit:contain;border-radius:8px;"></div>`;
                    }
                    docHTML +=
                        `<h2 style="text-align:center;${slide.images[0] && !isColorDark(slide.bgColor) ? '' : 'color:' + (isColorDark(slide.bgColor) ? '#ffffff' : '#1e293b') + ';'}">${escapeHTML(slide.title || '')}</h2>`;
                    if (slide.subtitle) {
                    docHTML +=
                        `<p style="text-align:center;${isColorDark(slide.bgColor) ? 'color:#e2e8f0;' : 'color:#475569;'}">${escapeHTML(slide.subtitle)}</p>`;
                    }
                    } else if (slide.layout === 2) {
                    docHTML += `<table><tr>`;
                    docHTML +=
                        `<td style="width:48%;">${slide.images[0] ? '<img src="' + slide.images[0] + '" style="width:100%;height:auto;object-fit:cover;border-radius:6px;">' : '<div style="width:100%;height:250px;background:#e2e8f0;border-radius:6px;text-align:center;line-height:250px;font-size:40px;color:#cbd5e1;">🖼️</div>'}</td>`;
                    docHTML += `<td style="width:52%;padding-left:16px;">`;
                    docHTML +=
                        `<h2 style="color:${isColorDark(slide.bgColor) ? '#ffffff' : '#1e293b'};">${escapeHTML(slide.title || '')}</h2>`;
                    if (slide.subtitle) {
                    docHTML +=
                        `<p style="color:${isColorDark(slide.bgColor) ? '#e2e8f0' : '#475569'};">${escapeHTML(slide.subtitle)}</p>`;
                    }
                    docHTML += `</td></tr></table>`;
                    } else if (slide.layout === 3) {
                    docHTML +=
                        `<h2 style="color:${isColorDark(slide.bgColor) ? '#ffffff' : '#1e293b'};">${escapeHTML(slide.title || '')}</h2>`;
                    docHTML += `<table><tr>`;
                    for (let i = 0; i < 4; i++) {
                    if (i === 2) docHTML += `</tr><tr>`;
                    docHTML += `<td style="width:50%;text-align:center;">`;
                    docHTML += slide.images[i] ?
                        `<img src="${slide.images[i]}" style="width:100%;height:180px;object-fit:cover;border-radius:6px;">` :
                        `<div style="width:100%;height:180px;background:#e2e8f0;border-radius:6px;text-align:center;line-height:180px;font-size:30px;color:#cbd5e1;">🖼️</div>`;
                    docHTML += `</td>`;
                    }
                    docHTML += `</tr></table>`;
                    }

                    docHTML += `</div>`;
                    });

                    docHTML += `</body></html>`;

                    const blob = new Blob(['\ufeff' + docHTML], {
                    type: 'application/msword'
                    });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'Documento_SlideCraft.doc';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    showToast('✅ Documento Word exportado com sucesso!', 'success');
                    } catch (err) {
                    console.error('Erro ao exportar DOCX:', err);
                    showToast('❌ Erro ao exportar documento. Tente novamente.', 'error');
                    }
                    };

                    // ============ HELPERS ============
                    function escapeHTML(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                    }

                    function isColorDark(hex) {
                    if (!hex || hex === '#ffffff' || hex === '#fff') return false;
                    if (hex === '#1e293b') return true;
                    const c = hex.replace('#', '');
                    const r = parseInt(c.substring(0, 2), 16);
                    const g = parseInt(c.substring(2, 4), 16);
                    const b = parseInt(c.substring(4, 6), 16);
                    const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                    return luminance < 0.5;
                    }

                    // ============ KEYBOARD NAVIGATION ============
                    document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    if (app.currentIndex > 0) selectSlide(app.currentIndex - 1);
                    } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (app.currentIndex < app.slides.length - 1) selectSlide(app.currentIndex + 1);
                    } else if (e.key === 'Delete' && e.ctrlKey) {
                    e.preventDefault();
                    if (app.slides.length > 1) removeSlide(app.currentIndex);
                    }
                    });

                    // ============ INITIAL RENDER ============
                    renderPreview();
                    updateThumbnails();

                    // ============ GLOBAL EXPOSURE ============
                    window.app = app;
                    window.selectSlide = selectSlide;
                    window.removeSlide = removeSlide;
                    window.renderPreview = renderPreview;
                    window.loadImageToSlot = loadImageToSlot;
                    window.removeImage = removeImage;
                    window.updateThumbnails = updateThumbnails;

                    console.log('🚀 SlideCraft Pro inicializado!');
                    console.log('   📊 Exporte como PowerPoint (.pptx)');
                    console.log('   📄 Exporte como Documento Word (.doc)');
                    console.log('   🖼️  3 layouts com suporte a imagens');
                    console.log('   ⌨️  Use setas para navegar entre slides');
                    console.log('   🖱️  Arraste imagens para o preview');

                })();
</script>
</body>
</html>
